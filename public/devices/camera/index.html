<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera</title>
  </head>
  <body>
    <canvas
      style="display: none"
      id="canvas-main"
      width="300"
      height="300"
    ></canvas>
    <video
      style="display: none"
      src=""
      id="video"
      width="300"
      height="300"
      controls
    ></video>

    <script src="../../config.js"></script>
    <script src="../../libraries/js/socket.io.min.js"></script>
    <script src="../../libraries/js/p5.js"></script>
    <script>
      const url = new URL(window.location.href);
      const device_id = url.searchParams.get("id");

      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas-main");

      let socket;

      function setup() {
        socket = io(config.api_url);
        // const canvas = createCanvas(320, 200);
        try {
          navigator.mediaDevices
            .getUserMedia({
              video: {
                facingMode: {
                  ideal: "environment",
                },
              },
              audio: false,
            })
            .then((stream) => {
              video.srcObject = stream;
              video.play();
            });
        } catch (error) {
          alert(JSON.stringify({ error }));
        }
      }

      function draw() {
        frameRate(5);

        canvas
          .getContext("2d")
          .drawImage(video, 0, 0, canvas.width, canvas.height);

        const src = canvas.toDataURL("image/jpeg");
        socket.emit("stream", { src: src, device_id });
      }
    </script>
  </body>
</html>
